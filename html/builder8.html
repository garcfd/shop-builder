<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Builder</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; }

#app {
  display: flex;
  height: 100vh;
}

#divider {
  width: 4px;
  cursor: col-resize;
  background: #0f3460;
  flex-shrink: 0;
}
#divider:hover { background: #e94560; }

#viewport {
  flex: 1;
  position: relative;
  cursor: crosshair;
  min-width: 0;
}
#viewport canvas { display: block; width: 100%; height: 100%; }

#sidebar {
  width: 288px;
  background: #16213e;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  border-left: none;
  flex-shrink: 0;
}

h1 { font-size: 16px; font-weight: 600; color: #e94560; letter-spacing: 1px; }
h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 4px; }

.palette {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
.palette-btn {
  aspect-ratio: 1;
  border: 2px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.15s;
}
.palette-btn:hover { border-color: #555; }
.palette-btn.active { border-color: #e94560; }
.palette-btn .label {
  position: absolute;
  bottom: 2px;
  left: 0; right: 0;
  text-align: center;
  font-size: 8px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  pointer-events: none;
}
.palette-btn .tex-thumb {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 4px;
}
.palette-btn-textured .label { display: none; }

.row { display: flex; gap: 8px; align-items: center; }
.row label { font-size: 12px; color: #aaa; flex-shrink: 0; width: 80px; }
.row .slider-val { font-size: 11px; color: #ccc; min-width: 32px; text-align: right; }

.btn {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
  flex: 1;
  text-align: center;
}
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #d63851; }
.btn-secondary { background: #0f3460; color: #eee; }
.btn-secondary:hover { background: #1a4a7a; }
.btn-danger { background: #533; color: #e88; }
.btn-danger:hover { background: #644; }

.btn-icon {
  width: 32px; height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex: none;
}

.stats {
  font-size: 12px;
  color: #888;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  background: #0f3460;
  height: 4px;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #e94560;
  cursor: pointer;
}

.help {
  font-size: 11px;
  color: #fff;
  line-height: 1.6;
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 12px;
  padding: 24px;
  max-width: 90vw;
  max-height: 80vh;
  overflow: auto;
}
.modal h3 { margin-bottom: 12px; color: #e94560; }
.modal pre {
  font-size: 11px;
  color: #aaa;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 40vh;
  overflow: auto;
  background: #0d1b2a;
  padding: 12px;
  border-radius: 6px;
}
.modal .row { margin-top: 12px; }
</style>
</head>
<body>
<div id="app">
  <div id="viewport"></div>
  <div id="divider"></div>
  <div id="sidebar">
    <h1>BLOCK BUILDER</h1>

    <div>
      <button class="btn btn-secondary" id="texturesToggle" style="width:100%;text-align:left">▸ Textures</button>

    <div>

      <div class="row"><label>Sun Bright</label><input type="range" id="sunBright" min="0" max="10" step="0.1" value="3.6" style="flex:1"><span id="sunBrightVal" class="slider-val">3.6</span></div>
      <div class="row"><label>Sun X</label><input type="range" id="lightX" min="-30" max="30" step="0.5" value="0" style="flex:1"><span id="lightXVal" class="slider-val">0</span></div>
      <div class="row"><label>Sun Y</label><input type="range" id="lightY" min="1" max="30" step="0.5" value="10" style="flex:1"><span id="lightYVal" class="slider-val">10</span></div>
      <div class="row"><label>Sun Z</label><input type="range" id="lightZ" min="-30" max="30" step="0.5" value="-30" style="flex:1"><span id="lightZVal" class="slider-val">-30</span></div>
      <div class="row"><label>Hang Bright</label><input type="range" id="hangBright" min="0" max="80" step="0.5" value="48" style="flex:1"><span id="hangBrightVal" class="slider-val">48</span></div>

        <b>Ctrl+LMB</b> — select block<br>
        <b>Ctrl+C</b> — copy + show ghost<br>

    </div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

function generateBrickTexture() {
  const w = 256, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');

  const bw = 48, bh = 24, mg = 3;
  const baseR = 210, baseG = 140, baseB = 100;

  ctx.fillStyle = '#ddd5c8';
  ctx.fillRect(0, 0, w, h);

  for (let row = 0; row < 10; row++) {
    const offset = (row % 2) * (bw / 2);
    for (let col = 0; col < 6; col++) {
      let x = col * (bw + mg) + offset + mg / 2;
      const y = row * (bh + mg) + mg / 2;
      const sh = 0.82 + Math.random() * 0.18;
      ctx.fillStyle = `rgb(${baseR*sh|0},${baseG*sh|0},${baseB*sh|0})`;
      if (x + bw > w) {
        ctx.fillRect(x, y, w - x, bh);
        ctx.fillRect(0, y, x + bw - w, bh);
      } else {
        ctx.fillRect(x, y, bw, bh);
      }
    }
  }

  const dataUrl = c.toDataURL();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  return { tex, dataUrl };
}

function generateMarbleTexture() {
  const w = 256, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const base = [190, 185, 180];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const n = Math.sin(x * 0.03 + y * 0.02) * 0.5 + Math.sin(x * 0.05 - y * 0.04 + 1.2) * 0.3 + Math.sin((x + y) * 0.07 + 2.5) * 0.2;
      const vein = Math.abs(Math.sin(x * 0.02 + y * 0.035 + n * 2)) > 0.92 ? -30 : 0;
      const speckle = Math.random() > 0.97 ? (Math.random() > 0.5 ? 15 : -15) : 0;
      const v = Math.max(0, Math.min(255, base[0] + n * 30 + vein + speckle));
      ctx.fillStyle = `rgb(${v|0},${(v*0.97)|0},${(v*0.94)|0})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  const dataUrl = c.toDataURL();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  return { tex, dataUrl };
}

const BRICK = generateBrickTexture();
const MARBLE = generateMarbleTexture();

function generatePineTexture() {
  const w = 256, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  for (let y = 0; y < h; y++) {
    const t = y / h;
    const grain = Math.sin(t * 80 + Math.sin(t * 150) * 3) * 0.5 + Math.sin(t * 200 + 1.3) * 0.25 + Math.sin(t * 50 + 0.7) * 0.25;
    const base = 160 + grain * 30 + (Math.sin(t * 400) * 0.5 + 0.5) * 10;
    const r = Math.max(0, Math.min(255, base + 30 + Math.random() * 6));
    const g = Math.max(0, Math.min(255, base + 10 + Math.random() * 4));
    const b = Math.max(0, Math.min(255, base - 20 + Math.random() * 4));
    ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
    ctx.fillRect(0, y, w, 1);
  }
  const dataUrl = c.toDataURL();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  return { tex, dataUrl };
}

const PINE = generatePineTexture();

function generateTileTexture() {
  const w = 256, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const tiles = 4;
  const tw = w / tiles, th = h / tiles;
  const grout = 3;
  for (let r = 0; r < tiles; r++) {
    for (let col = 0; col < tiles; col++) {
      const x = col * tw;
      const y = r * th;
      const shade = 0.92 + Math.random() * 0.08;
      const rC = Math.min(255, (220 * shade) | 0);
      const gC = Math.min(255, (205 * shade) | 0);
      const bC = Math.min(255, (180 * shade) | 0);
      ctx.fillStyle = `rgb(${rC},${gC},${bC})`;
      ctx.fillRect(x + grout, y + grout, tw - grout * 2, th - grout * 2);
    }
  }
  const dataUrl = c.toDataURL();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  return { tex, dataUrl };
}

const TILES = generateTileTexture();

function generateSlateTexture() {
  const w = 256, h = 256;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(0, 0, w, h);
  const tiles = 4;
  const tw = w / tiles, th = h / tiles;
  const g = 3;
  for (let r = 0; r < tiles; r++) {
    for (let col = 0; col < tiles; col++) {
      const shade = 0.9 + Math.random() * 0.1;
      const v = Math.round(128 * shade);
      ctx.fillStyle = `rgb(${v},${v},${v})`;
      ctx.fillRect(col * tw + g, r * th + g, tw - g * 2, th - g * 2);
    }
  }
  const dataUrl = c.toDataURL();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 1);
  tex.anisotropy = 4;
  return { tex, dataUrl };
}

const SLATE = generateSlateTexture();

const BLOCK_TYPES = [
 { id: 'wall',    label: 'Wall',    color: '#d4c5a9', roughness: 0.9, metalness: 0 },
 { id: 'tiles',   label: 'Tiles',   color: '#dcccae', roughness: 0.7, metalness: 0, tex: TILES.tex, texUrl: TILES.dataUrl },
 { id: 'ceil',    label: 'Ceiling', color: '#f0f0f0', roughness: 0.7, metalness: 0 },
 { id: 'brick',   label: 'Brick',   color: '#ffffff', roughness: 0.9, metalness: 0, tex: BRICK.tex, texUrl: BRICK.dataUrl },
 { id: 'glass',   label: 'Glass',   color: '#88ccee', roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.35 },
 { id: 'marble',  label: 'Marble',  color: '#b8b4ad', roughness: 0.4, metalness: 0.15, tex: MARBLE.tex, texUrl: MARBLE.dataUrl },
 { id: 'pine',    label: 'Pine',    color: '#c4a46c', roughness: 0.85, metalness: 0, tex: PINE.tex, texUrl: PINE.dataUrl },
  { id: 'slate',   label: 'Slate',   color: '#ffffff', roughness: 0.9, metalness: 0.05, tex: SLATE.tex, texUrl: SLATE.dataUrl },
  { id: 'light',   label: 'Light',   color: '#ffeedd', roughness: 0.3, metalness: 0, emissive: '#ffeedd', emissiveIntensity: 2 },
];

const selection = new Map(); // cellKey -> BoxHelper

const undoStack = [];

let isOrtho = false;

let scene, camera, renderer, controls, sunLight, sunMarker, headlight, hangingLight, hangingFixture;
const clock = new THREE.Clock();

// ======== INDEXEDDB HELPERS ========

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('BlockBuilder', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('store');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readonly');
    const req = tx.objectStore('store').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readwrite');
    const req = tx.objectStore('store').put(val, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ======== THREE SETUP ========

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a2a4a);

  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 5, -30);
  camera.lookAt(0, 5, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  viewport.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 5, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.minDistance = 3;
  controls.maxDistance = 40;
  controls.maxPolarAngle = Math.PI;
  controls.addEventListener('change', () => {
    const dist = camera.position.distanceTo(controls.target);
    zoomSlider.value = Math.round((52 - dist) * 10) / 10;
    const offset = new THREE.Vector3().copy(camera.position).sub(controls.target);
    const spherical = new THREE.Spherical().setFromVector3(offset);
    const deg = THREE.MathUtils.radToDeg(spherical.theta) % 360;
    const rounded = Math.round((deg + 360) % 360);
    rotSlider.value = rounded;
  });
  controls.update();
  controls.saveState();

  // Lights
  sunLight = new THREE.DirectionalLight(0xffeedd, 3.6);
  sunLight.position.set(0, 10, -30);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 1024;
  sunLight.shadow.mapSize.height = 1024;
  sunLight.shadow.camera.near = 0.5;
  sunLight.shadow.camera.far = 40;
  sunLight.shadow.camera.left = -15;
  sunLight.shadow.camera.right = 15;
  sunLight.shadow.camera.top = 15;
  sunLight.shadow.camera.bottom = -15;
  scene.add(sunLight);

document.getElementById('camToggleBtn').addEventListener('click', () => {
  isOrtho = !isOrtho;
  const pos = camera.position.clone();
  const target = controls.target.clone();
  const quat = camera.quaternion.clone();
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;

  controls.dispose();

  if (isOrtho) {
    const dist = pos.distanceTo(target);
    const frustum = dist * Math.tan(THREE.MathUtils.degToRad(45 / 2));
    camera = new THREE.OrthographicCamera(
      -frustum * w / h, frustum * w / h,
      frustum, -frustum,
      0.1, 100
    );
    camera.zoom = 2.6;
  } else {
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  }
  camera.position.copy(pos);
  camera.quaternion.copy(quat);
  camera.updateProjectionMatrix();

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.copy(target);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.minDistance = 3;
  controls.maxDistance = 40;
  controls.maxPolarAngle = Math.PI;
  controls.addEventListener('change', () => {
    if (isOrtho) {
      zoomSlider.value = Math.round(camera.zoom * 10);
    } else {
      const dist = camera.position.distanceTo(controls.target);
      zoomSlider.value = Math.round((52 - dist) * 10) / 10;
    }
    const offset = new THREE.Vector3().copy(camera.position).sub(controls.target);
    const spherical = new THREE.Spherical().setFromVector3(offset);
    const deg = THREE.MathUtils.radToDeg(spherical.theta) % 360;
    const rounded = Math.round((deg + 360) % 360);
    rotSlider.value = rounded;
  });
  controls.update();
  controls.saveState();

  document.getElementById('camToggleBtn').textContent = isOrtho ? 'Perspective' : 'Orthographic';
});

// ======== BLOCK MATERIAL ========

function makeMaterial(type, color, texture) {
  const def = BLOCK_TYPES.find(t => t.id === type.id) || type;

  const matOpts = {
    color: texture ? '#ffffff' : (color || def.color),
    roughness: def.roughness ?? 0.7,
    metalness: def.metalness ?? 0,
    transparent: def.transparent || false,
    opacity: def.opacity ?? 1,
    side: def.transparent ? THREE.DoubleSide : THREE.FrontSide,
  };

  if (def.emissive) {
    matOpts.emissive = def.emissive;
    matOpts.emissiveIntensity = def.emissiveIntensity ?? 1;
  }

  if (def.tex) {
    matOpts.color = '#ffffff';
    matOpts.map = def.tex;
  } else if (texture) {
    matOpts.map = texture;
  }

  return new THREE.MeshStandardMaterial(matOpts);
}

// ======== BLOCK CRUD ========

function cellKey(c) { return `${c.x},${c.y},${c.z}`; }

function isOccupied(c) {
  return blocks.has(cellKey(c));
}

function createBlock(cell, type, color, texture) {
  const key = cellKey(cell);
  if (isOccupied(cell)) return null;

  const blockType = texture
  ? {
      id: 'image',
      label: 'Image',
      color: '#ffffff',
      roughness: 0.7,
      metalness: 0
    }
  : type;

  const mat = makeMaterial(blockType, color, texture);
  const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(cell.x + 0.5, cell.y + 0.5, cell.z + 0.5);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const id = blockIdCounter++;
  const data = { mesh, cell: { ...cell }, type, color, texture, id };
  mesh.userData.blockData = data;

  if (type.id === 'light') {
    const pl = new THREE.PointLight(0xffeedd, 1.5, 12);
    pl.position.set(0.5, 0.5, 0.5);
    mesh.add(pl);
    data.light = pl;
  }

  blocks.set(key, data);
  scene.add(mesh);

  if (!undoBlocked) {
    undoStack.push({ type: 'place', cell: { ...cell }, data });
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }
  if (!_importing) saveToStorage();
  return data;
}

function removeBlock(cell) {
  const key = cellKey(cell);
  const data = blocks.get(key);
  if (!data) return;

  if (!undoBlocked) {
    undoStack.push({
      type: 'remove', cell: { ...cell },
      saved: { type: data.type, color: data.color, texture: data.texture }
    });
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }

  scene.remove(data.mesh);
  data.mesh.geometry.dispose();
  data.mesh.material.dispose();
  if (data.light) data.mesh.remove(data.light);
  blocks.delete(key);
  saveToStorage();
}

function clearAll() {
  const keys = [...blocks.keys()];
  for (const key of keys) {
    const data = blocks.get(key);
    scene.remove(data.mesh);
    data.mesh.geometry.dispose();
    data.mesh.material.dispose();
    if (data.light) data.mesh.remove(data.light);
    blocks.delete(key);
  }
  for (const m of murals) {
    scene.remove(m.mesh);
    m.mesh.geometry.dispose();
    m.mesh.material.dispose();
  }
  murals.length = 0;
  for (const l of labels) {
    scene.remove(l.sprite);
    l.sprite.geometry.dispose();
    l.sprite.material.dispose();
  }
  labels.length = 0;
  if (!_importing) saveToStorage();
}

// ======== PLACEMENT HELPERS ========

function getBlockMeshes() {
  const arr = [];
  for (const data of blocks.values()) {
    arr.push(data.mesh);
  }
  return arr;
}

function getSnapFromGround(point) {
  const x = Math.floor(point.x);
  const z = Math.floor(point.z);
  const y = 0;
  if (x < GRID_MIN || x >= GRID_MAX || z < GRID_MIN || z >= GRID_MAX) return null;
  return { x, y, z };
}

function getSnapFromBlockFace(blockData, normal) {
  const n = { x: Math.round(normal.x), y: Math.round(normal.y), z: Math.round(normal.z) };
  const cell = {
    x: blockData.cell.x + n.x,
    y: blockData.cell.y + n.y,
    z: blockData.cell.z + n.z,
  };
  if (cell.x < GRID_MIN || cell.x >= GRID_MAX ||
      cell.z < GRID_MIN || cell.z >= GRID_MAX ||
      cell.y < HEIGHT_MIN || cell.y >= HEIGHT_MAX) return null;
  return cell;
}

function findLabelAtScreen(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  let best = null, bestDist = 30;
  for (const l of labels) {
    const v = l.sprite.position.clone().project(camera);
    const sx = (v.x * 0.5 + 0.5) * rect.width;
    const sy = (-v.y * 0.5 + 0.5) * rect.height;
    const d = Math.hypot(clientX - rect.left - sx, clientY - rect.top - sy);
    if (d < bestDist) { bestDist = d; best = l; }
  }
  return best;
}

// ======== POINTER / INTERACTION ========

let mouseDownPos = { x: 0, y: 0 };
let isPointerDown = false;

function getIntersection(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);

  const meshes = getBlockMeshes();
  const muralMeshes = murals.map(m => m.mesh);
  const targets = [...meshes, ...muralMeshes, groundMesh];
  const intersects = raycaster.intersectObjects(targets);
  if (intersects.length === 0) return null;

  const hit = intersects[0];
  const obj = hit.object;

  if (obj === groundMesh) {
    const cell = getSnapFromGround(hit.point);
    return cell ? { type: 'ground', cell } : null;
  }

  // Check if hit a mural
  const mural = murals.find(m => m.mesh === obj);
  if (mural) return { type: 'mural', mural };

  const blockData = obj.userData.blockData;
  if (!blockData) return null;

  const normal = hit.face.normal.clone();
  normal.transformDirection(obj.matrixWorld);
  const cell = getSnapFromBlockFace(blockData, normal);
  if (!cell) return { type: 'block', blockData, normal, cell: null };
  return { type: 'block', blockData, normal, cell };
}

function placeBlockAt(clientX, clientY) {
  const result = getIntersection(clientX, clientY);
  if (!result) return;

  let cell;
  if (result.type === 'ground') {
    cell = result.cell;
  } else {
    cell = result.cell;
  }
  if (!cell) return;
  if (isOccupied(cell)) return;

  createBlock(cell, selectedType, selectedType.color, customTexture);
}

function removeBlockAt(clientX, clientY) {
  const result = getIntersection(clientX, clientY);
  if (!result || result.type === 'ground') return;
  const cell = result.blockData.cell;
  removeBlock(cell);
}

function repaintBlockAt(clientX, clientY) {
  const result = getIntersection(clientX, clientY);
  if (!result || result.type === 'ground') return;
  const data = result.blockData;
  const oldType = data.type;
  const oldColor = data.color;
  const oldTexture = data.texture;
  const paintType = customTexture
  ? {
      id: 'image',
      label: 'Image',
      color: '#ffffff',
      roughness: 0.7,
      metalness: 0
    }
  : selectedType;

  const mat = makeMaterial(paintType, selectedType.color, customTexture);
  data.mesh.material.dispose();
  data.mesh.material = mat;
  data.type = paintType;
  data.color = selectedType.color;
  data.texture = customTexture;

  undoStack.push({
    type: 'repaint', cell: { ...data.cell },
    oldType, oldColor, oldTexture,
    newType: selectedType, newColor: selectedType.color, newTexture: customTexture,
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  saveToStorage();
}

// ======== SELECTION ========

function toggleSelectMode() {
  isSelectMode = !isSelectMode;
  const btn = document.getElementById('selectBtn');
  btn.textContent = 'Select: ' + (isSelectMode ? 'On' : 'Off');
  btn.className = isSelectMode ? 'btn btn-primary' : 'btn btn-secondary';
  const help = document.getElementById('help');
  if (isSelectMode) {
    help.innerHTML =
      '<b>LMB</b> — toggle select block<br>' +
      '<b>Ctrl+C</b> — copy selected<br>' +
      '<b>Ctrl+X</b> — cut selected<br>' +
      '<b>Ctrl+V</b> — paste<br>' +
      '<b>Drag</b> — orbit<br>' +
      '<b>Scroll</b> — zoom';
  } else {
    help.innerHTML =
      '<b>LMB</b> — place block<br>' +
      '<b>Shift+LMB</b> — repaint block<br>' +
      '<b>RMB</b> — remove block<br>' +
      '<b>Drag</b> — orbit<br>' +
      '<b>Scroll</b> — zoom';
  }
  if (!isSelectMode) clearSelection();
}

function addSelection(cell) {
  const key = cellKey(cell);
  const data = blocks.get(key);
  if (!data || selection.has(key)) return;
  const helper = new THREE.BoxHelper(data.mesh, 0xff4444);
  helper.update();
  scene.add(helper);
  selection.set(key, helper);
}

function removeSelection(cell) {
  const key = cellKey(cell);
  const helper = selection.get(key);
  if (!helper) return;
  scene.remove(helper);
  helper.dispose();
  selection.delete(key);
}

function toggleSelection(cell) {
  const key = cellKey(cell);
  if (selection.has(key)) removeSelection(cell);
  else addSelection(cell);
}

function clearSelection() {
  for (const [key, helper] of selection) {
    scene.remove(helper);
    helper.dispose();
  }
  selection.clear();
}

function notify(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {
    position: 'fixed', top: '16px', left: '50%', transform: 'translateX(-50%)',
    background: '#e94560', color: '#fff', padding: '8px 20px', borderRadius: '6px',
    fontSize: '14px', zIndex: '200', pointerEvents: 'none',
    transition: 'opacity 0.3s', fontFamily: 'system-ui, sans-serif',
  });
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 800);
}

function copySelection() {
  clipBuffer.length = 0;
  if (selection.size === 0) { notify('No blocks selected'); return; }
  // Use the first selected block as origin
  let origin = null;
  for (const key of selection.keys()) {
    const [x, y, z] = key.split(',').map(Number);
    if (!origin) origin = { x, y, z };
  }
  for (const [key, helper] of selection) {
    const [x, y, z] = key.split(',').map(Number);
    const data = blocks.get(key);
    if (!data) continue;
    clipBuffer.push({
      cell: { x: x - origin.x, y: y - origin.y, z: z - origin.z },
      type: data.type,
      color: data.color,
      texture: data.texture,
    });
  }
  notify('Copied ' + clipBuffer.length + ' block' + (clipBuffer.length > 1 ? 's' : ''));
  buildPasteGhost();
}

function cutSelection() {
  copySelection();
  // Collect keys to remove
  const keys = [...selection.keys()];
  undoBlocked = true;
  for (const key of keys) {
    const [x, y, z] = key.split(',').map(Number);
    removeBlock({ x, y, z });
  }
  undoBlocked = false;
  clearSelection();
  notify('Cut ' + keys.length + ' block' + (keys.length > 1 ? 's' : ''));
}

function pasteClipboard() {
  if (clipBuffer.length === 0) { notify('Nothing to paste'); return; }
  // Find min/max to compute bounds for auto-offset
  let minX = Infinity, maxX = -Infinity, minZ = Infinity;
  for (const b of clipBuffer) {
    if (b.cell.x < minX) minX = b.cell.x;
    if (b.cell.x > maxX) maxX = b.cell.x;
    if (b.cell.z < minZ) minZ = b.cell.z;
  }
  const width = maxX - minX + 2; // +2 for margin

  // Auto-offset X to avoid overlap
  let offsetX = width;
  // Check existing blocks to find a clear spot
  for (let attempt = 0; attempt < 20; attempt++) {
    let clear = true;
    for (const b of clipBuffer) {
      const checkKey = cellKey({ x: b.cell.x + offsetX, y: b.cell.y, z: b.cell.z });
      if (blocks.has(checkKey)) { clear = false; offsetX += width; break; }
    }
    if (clear) break;
  }

  undoBlocked = true;
  for (const b of clipBuffer) {
    createBlock(
      { x: b.cell.x + offsetX, y: b.cell.y, z: b.cell.z },
      b.type, b.color, b.texture
    );
  }
  undoBlocked = false;
  clearPasteGhost();
  notify('Pasted ' + clipBuffer.length + ' block' + (clipBuffer.length > 1 ? 's' : ''));
}

function pasteAtPosition(cell) {
  if (clipBuffer.length === 0) return;
  undoBlocked = true;
  for (const b of clipBuffer) {
    createBlock(
      { x: cell.x + b.cell.x, y: cell.y + b.cell.y, z: cell.z + b.cell.z },
      b.type, b.color, b.texture
    );
  }
  undoBlocked = false;
  clearPasteGhost();
  notify('Pasted ' + clipBuffer.length + ' block' + (clipBuffer.length > 1 ? 's' : ''));
}

function clearPasteGhost() {
  if (pasteGhostGroup) {
    scene.remove(pasteGhostGroup);
    pasteGhostGroup.traverse(child => {
      if (child.isMesh) { child.geometry.dispose(); child.material.dispose(); }
    });
    pasteGhostGroup = null;
  }
  pasteGhostCell = null;
}

function buildPasteGhost() {
  clearPasteGhost();
  if (clipBuffer.length === 0) return;
  const group = new THREE.Group();
  for (const b of clipBuffer) {
    const def = BLOCK_TYPES.find(t => t.id === b.type.id) || BLOCK_TYPES[0];
    const mat = new THREE.MeshStandardMaterial({
      color: b.color || def.color,
      transparent: true,
      opacity: 0.3,
      roughness: 0.5,
      metalness: 0,
      depthWrite: false,
    });
    const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(b.cell.x, b.cell.y, b.cell.z);
    // wireframe edge
    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const edge = new THREE.LineSegments(edgeGeo, edgeMat);
    edge.position.copy(mesh.position);
    group.add(mesh);
    group.add(edge);
  }
  group.visible = false;
  scene.add(group);
  pasteGhostGroup = group;
}

function toggleMuralMode() {
  if (isMuralMode) {
    isMuralMode = false;
    muralCorner1 = null;
    clearMuralPreview();
    muralBtn.textContent = 'Mural';
    muralBtn.className = 'btn btn-secondary';
  } else {
    if (isLabelMode) {
      isLabelMode = false;
      labelCorner1 = null;
      labelBtn.textContent = 'Label';
      labelBtn.className = 'btn btn-secondary';
    }
    isMuralMode = true;
    muralCorner1 = null;
    muralBtn.textContent = 'Mural: ON';
    muralBtn.className = 'btn btn-primary';
    notify('Click a block face for the mural corner');
  }
}

function updateGhost(clientX, clientY) {
  if (pasteGhostGroup) {
    if (ghostMesh) ghostMesh.visible = false;
    const result = getIntersection(clientX, clientY);
    if (!result || !result.cell) {
      pasteGhostGroup.visible = false;
      return;
    }
    const cell = result.cell;
    let blocked = false;
    for (const b of clipBuffer) {
      const ck = cellKey({ x: cell.x + b.cell.x, y: cell.y + b.cell.y, z: cell.z + b.cell.z });
      if (blocks.has(ck)) { blocked = true; break; }
    }
    if (blocked) {
      pasteGhostGroup.visible = false;
      return;
    }
    pasteGhostGroup.position.set(cell.x + 0.5, cell.y + 0.5, cell.z + 0.5);
    pasteGhostGroup.visible = true;
    pasteGhostCell = cell;
    return;
  }

  if (!ghostMesh) {
    const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.25,
      depthWrite: false,
    });
    ghostMesh = new THREE.Mesh(geo, mat);
    ghostMesh.renderOrder = 999;
    scene.add(ghostMesh);
  }

  const result = getIntersection(clientX, clientY);
  if (!result || (result.type === 'block' && !result.cell)) {
    ghostMesh.visible = false;
    return;
  }

  let cell;
  if (result.type === 'ground') {
    cell = result.cell;
  } else {
    cell = result.cell;
  }

  if (!cell || isOccupied(cell)) {
    ghostMesh.visible = false;
    return;
  }

  ghostMesh.position.set(cell.x + 0.5, cell.y + 0.5, cell.z + 0.5);
  ghostMesh.visible = true;
}

// ======== MURAL ========

function clearMuralPreview() {

function updateMuralPreview(cell2) {
  clearMuralPreview();
  if (!muralCorner1 || !customTexture) return;
  const c1 = muralCorner1.cell;
  const normal = muralCorner1.normal;
  const orig = muralCorner1.blockData.cell;
  const minX = Math.min(c1.x, cell2.x);
  const maxX = Math.max(c1.x, cell2.x);
  const minY = Math.min(c1.y, cell2.y);
  const maxY = Math.max(c1.y, cell2.y);
  const minZ = Math.min(c1.z, cell2.z);
  const maxZ = Math.max(c1.z, cell2.z);

  let w, h, cx, cy, cz, rot;
  if (normal.x !== 0) {
    w = maxZ - minZ + 1;
    h = maxY - minY + 1;
    cx = orig.x + (normal.x > 0 ? 1 : 0) + normal.x * 0.005;
    cy = (minY + maxY) / 2 + 0.5;
    cz = (minZ + maxZ) / 2 + 0.5;
    rot = { x: 0, y: normal.x > 0 ? Math.PI / 2 : -Math.PI / 2, z: 0 };
  } else if (normal.z !== 0) {
    w = maxX - minX + 1;
    h = maxY - minY + 1;
    cx = (minX + maxX) / 2 + 0.5;
    cy = (minY + maxY) / 2 + 0.5;
    cz = orig.z + (normal.z > 0 ? 1 : 0) + normal.z * 0.005;
    rot = { x: 0, y: normal.z > 0 ? 0 : Math.PI, z: 0 };
  } else {
    w = maxX - minX + 1;
    h = maxZ - minZ + 1;
    cx = (minX + maxX) / 2 + 0.5;
    cy = orig.y + (normal.y > 0 ? 1 : 0) + normal.y * 0.005;
    cz = (minZ + maxZ) / 2 + 0.5;
    rot = { x: -Math.PI / 2, y: 0, z: 0 };
  }

  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    map: customTexture,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  muralPreview = new THREE.Mesh(geo, mat);
  muralPreview.position.set(cx, cy, cz);
  muralPreview.rotation.set(rot.x, rot.y, rot.z);
  muralPreview.renderOrder = 998;
  scene.add(muralPreview);
}

  const maxY = Math.max(c1.y, cell2.y);
  const minZ = Math.min(c1.z, cell2.z);
  const maxZ = Math.max(c1.z, cell2.z);

  const text = prompt('Enter label text:');
  if (!text) { labelCorner1 = null; isLabelMode = false; labelBtn.textContent = 'Label'; labelBtn.className = 'btn btn-secondary'; return; }

  let w, h, cx, cy, cz, rot;
  if (normal.x !== 0) {
    w = maxZ - minZ + 1; h = maxY - minY + 1;
    cx = orig.x + (normal.x > 0 ? 1 : 0) + normal.x * 0.005;
    cy = (minY + maxY) / 2 + 0.5;
    cz = (minZ + maxZ) / 2 + 0.5;
    rot = { x: 0, y: normal.x > 0 ? Math.PI / 2 : -Math.PI / 2, z: 0 };
  } else if (normal.z !== 0) {
    w = maxX - minX + 1; h = maxY - minY + 1;
    cx = (minX + maxX) / 2 + 0.5;
    cy = (minY + maxY) / 2 + 0.5;
    cz = orig.z + (normal.z > 0 ? 1 : 0) + normal.z * 0.005;
    rot = { x: 0, y: normal.z > 0 ? 0 : Math.PI, z: 0 };

    cx = (minX + maxX) / 2 + 0.5;

  const canvasH = Math.max(128, h * 512);
  const canvas = document.createElement('canvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  const rotateText = w < h;
  const textDim = rotateText ? canvas.height : canvas.width;
  let fontSize = textDim * 0.6;
  do {
    ctx.font = `bold ${fontSize}px system-ui, sans-serif`;

function setupEvents() {
  const canvas = renderer.domElement;

  canvas.addEventListener('pointerdown', (e) => {
    mouseDownPos.x = e.clientX;
    mouseDownPos.y = e.clientY;
    isPointerDown = true;
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!isPointerDown) return;
    isPointerDown = false;
    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > 5) return;

    if (e.button === 0) {
      if (isLabelMode) {
        const result = getIntersection(e.clientX, e.clientY);
        if (result && result.type === 'block' && result.cell) {
          if (!labelCorner1) {
            labelCorner1 = { cell: { ...result.cell }, normal: result.normal, blockData: result.blockData };
            notify('Label: click a second block on the same face');
          } else {
            createLabel(result.cell);
          }
        }
        return;
      }
      if (isMuralMode) {
        const result = getIntersection(e.clientX, e.clientY);
        if (result && result.type === 'block' && result.cell) {
          if (!muralCorner1) {
            muralCorner1 = { cell: { ...result.cell }, normal: { ...result.normal }, blockData: result.blockData };
            notify('Mural: click a second block on the same face');
          } else {
            createMural(result.cell);
          }
        }
        return;
      }
      if (isProbeMode) {
        const result = getIntersection(e.clientX, e.clientY);
        if (result && result.type === 'block' && result.cell) {
          const c = result.cell;
          notify(`Block at x:${c.x} y:${c.y} z:${c.z}`);
        } else if (result && result.type === 'ground' && result.cell) {
          const c = result.cell;
          notify(`Ground cell at x:${c.x} y:${c.y} z:${c.z}`);
        }
        return;
      }
      if (e.ctrlKey || e.metaKey) {
        const result = getIntersection(e.clientX, e.clientY);
        if (result && result.type === 'block') {
          toggleSelection(result.blockData.cell);
        } else if (result && result.type === 'ground' && clipBuffer.length > 0) {
          pasteAtPosition(result.cell);
          clearPasteGhost();
        } else {
          placeBlockAt(e.clientX, e.clientY);
        }
      } else if (pasteGhostGroup && pasteGhostCell) {
        pasteAtPosition(pasteGhostCell);
        clearPasteGhost();
      } else if (isSelectMode) {
        placeBlockAt(e.clientX, e.clientY);
      } else if (e.shiftKey) {
        repaintBlockAt(e.clientX, e.clientY);
      } else {
        const result = getIntersection(e.clientX, e.clientY);
        if (result && result.type === 'mural') {
          const idx = murals.indexOf(result.mural);
          if (idx !== -1) {
            scene.remove(result.mural.mesh);
            result.mural.mesh.geometry.dispose();
            result.mural.mesh.material.dispose();
            murals.splice(idx, 1);
            notify('Mural removed');
          }
        } else {
          placeBlockAt(e.clientX, e.clientY);
        }
      }
    } else if (e.button === 2) {
      // Check labels first (distance-based, no raycaster overhead)
      const hitLabel = findLabelAtScreen(e.clientX, e.clientY);
      if (hitLabel) {
        scene.remove(hitLabel.sprite);
        hitLabel.sprite.geometry.dispose();
        hitLabel.sprite.material.dispose();
        const idx = labels.indexOf(hitLabel);
        if (idx !== -1) labels.splice(idx, 1);
        notify('Label removed');
        return;
      }
      const result = getIntersection(e.clientX, e.clientY);
      if (!result) return;
      if (result.type === 'mural') {
        scene.remove(result.mural.mesh);
        result.mural.mesh.geometry.dispose();
        result.mural.mesh.material.dispose();
        const idx = murals.indexOf(result.mural);
        if (idx !== -1) murals.splice(idx, 1);
        notify('Mural removed');
      } else if (result.type === 'block') {
        const cell = result.blockData.cell;
        if (cell) removeBlock(cell);
      }
    }
  });

  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  const texTooltip = document.createElement('div');
  texTooltip.id = 'texTooltip';
  Object.assign(texTooltip.style, {
    position: 'fixed', pointerEvents: 'none', display: 'none',
    background: 'rgba(0,0,0,0.8)', color: '#fff', padding: '4px 10px',
    borderRadius: '4px', fontSize: '12px', zIndex: '300',
    fontFamily: 'system-ui, sans-serif', whiteSpace: 'nowrap',
  });
  document.body.appendChild(texTooltip);

  canvas.addEventListener('pointermove', (e) => {
    if (isMuralMode && muralCorner1) {
      const result = getIntersection(e.clientX, e.clientY);
      if (result && result.type === 'block' && result.cell) {
        updateMuralPreview(result.cell);
      } else {
        clearMuralPreview();
      }
    } else {
      updateGhost(e.clientX, e.clientY);
    }

    const hit = getIntersection(e.clientX, e.clientY);
    if (hit && hit.type === 'block' && hit.blockData) {
      const data = hit.blockData;
      if (data && data.texture) {
        const entry = dirImages.find(di => di.texture.image.src === data.texture.image.src);
        if (entry) {
          texTooltip.textContent = entry.name;
        } else {
          texTooltip.textContent = data.type.label || 'Custom texture';
        }
      } else {
        texTooltip.textContent = data.type.label;
      }
      texTooltip.style.left = (e.clientX + 12) + 'px';
      texTooltip.style.top = (e.clientY + 12) + 'px';
      texTooltip.style.display = '';
    } else {
      texTooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('pointerleave', () => {
    if (ghostMesh) ghostMesh.visible = false;
  });
}

// ======== PALETTE UI ========

function buildPalette() {
  paletteEl.innerHTML = '';
  BLOCK_TYPES.forEach((type, i) => {
    const btn = document.createElement('button');
    btn.className = 'palette-btn';
    if (type.id === selectedType.id && !textureActive) btn.classList.add('active');
    if (type.texUrl) {
      btn.style.backgroundImage = `url(${type.texUrl})`;
      btn.style.backgroundSize = 'cover';
    } else {
      btn.style.background = type.color;
    }
    btn.dataset.id = type.id;
    btn.innerHTML = `<span class="label">${type.label}</span>`;
    btn.addEventListener('click', () => selectType(type.id));
    paletteEl.appendChild(btn);
  });
  updateTexturePaletteEntry();
}

function updateTexturePaletteEntry() {
  // Find or create textured entries
  const existing = paletteEl.querySelectorAll('.palette-btn-textured');
  for (const el of existing) el.remove();

  if (customTexture) {
    const btn = document.createElement('button');
    btn.className = 'palette-btn palette-btn-textured';
    const thumb = document.createElement('img');
    thumb.className = 'tex-thumb';
    thumb.src = customTexture.image.src;
    btn.appendChild(thumb);
    btn.title = 'Custom texture';
    btn.addEventListener('click', () => {
      paletteEl.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      textureActive = true;
      selectedType = { id: 'custom', label: 'Texture', color: selectedType.color, roughness: 0.7, metalness: 0 };
      texClearBtn.style.display = '';
    });
    paletteEl.insertBefore(btn, paletteEl.children[0]);
  }
}

function selectType(id) {
  texClearBtn.style.display = 'none';
  textureActive = false;
  customTexture = null;
  const type = BLOCK_TYPES.find(t => t.id === id);
  if (!type) return;
  selectedType = type;

  paletteEl.querySelectorAll('.palette-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  updateTexturePaletteEntry();
}

function renderDirImagePalette() {
  const dirPalette = document.getElementById('dirPalette');
  const section = document.getElementById('dirPaletteSection');
  dirPalette.innerHTML = '';
  if (dirImages.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  for (const di of dirImages) {
    const btn = document.createElement('button');
    btn.className = 'palette-btn palette-btn-dir';
    const thumb = document.createElement('img');
    thumb.className = 'tex-thumb';
    thumb.src = di.texture.image.src;
    btn.appendChild(thumb);
    btn.title = di.name;
    btn.addEventListener('click', () => {
      paletteEl.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
      dirPalette.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      customTexture = di.texture;
      textureActive = true;
      selectedType = { id: 'custom', label: di.name, color: '#ffffff', roughness: 0.7, metalness: 0 };
      texClearBtn.style.display = '';
      updateTexturePaletteEntry();
    });
    dirPalette.appendChild(btn);
  }
}

function imgToDataUrl(img, maxSize) {
  maxSize = maxSize || 256;
  const c = document.createElement('canvas');
  const scale = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));
  c.width = Math.round(img.naturalWidth * scale);
  c.height = Math.round(img.naturalHeight * scale);
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', 0.7);
}

function loadDirImagesFromData(images) {
  dirImages.length = 0;
  for (const { name, dataUrl } of images) {
    const img = new Image();
    img.src = dataUrl;
    const tex = new THREE.Texture(img);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.needsUpdate = true;
    dirImages.push({ name, texture: tex });
  }
  renderDirImagePalette();
}

function loadImagesFromFileList(fileList) {
  const images = [];
  const files = [];
  for (let i = 0; i < fileList.length; i++) {
    const f = fileList[i];
    if (/\.(png|jpg|jpeg|gif|webp)$/i.test(f.name)) files.push(f);
  }
  if (files.length === 0) { notify('No image files found'); return; }
  let loaded = 0;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const dataUrl = imgToDataUrl(img);
        images.push({ name: file.name, dataUrl });
        loaded++;
        if (loaded === files.length) {
          idbSet('dirImagesData', images);
          loadDirImagesFromData(images);
          notify('Loaded ' + images.length + ' images');
        }
      };
      img.onerror = () => {
        loaded++;
        if (loaded === files.length) {
          idbSet('dirImagesData', images);
          loadDirImagesFromData(images);
        }
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function loadImagesFromNames(names) {
  if (!names || names.length === 0) return;
  const images = [];
  let loaded = 0;
  for (const name of names) {
    const img = new Image();
    img.onload = () => {
      const dataUrl = imgToDataUrl(img);
      images.push({ name, dataUrl });
      loaded++;
      if (loaded === names.length) {
        idbSet('dirImagesData', images);
        loadDirImagesFromData(images);
        notify('Loaded ' + images.length + ' images');
      }
    };
    img.onerror = () => {
      loaded++;
      if (loaded === names.length) {
        idbSet('dirImagesData', images);
        loadDirImagesFromData(images);
      }
    };
    img.src = '../images/' + name;
  }
}

function scanDirViaIframe(dirPath, timeoutMs) {
  return new Promise((resolve) => {
    const timer = setTimeout(() => { iframe.remove(); resolve(null); }, timeoutMs || 2000);
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.onload = () => {
      clearTimeout(timer);
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const links = doc.querySelectorAll('a');
        const files = [];
        for (const link of links) {
          const href = link.getAttribute('href');
          if (href && !href.startsWith('?') && !href.startsWith('/') && href !== '../' && href !== '') {
            let name = decodeURIComponent(href);
            if (name.startsWith('./')) name = name.slice(2);
            if (name) files.push(name);
          }
        }
        iframe.remove();
        resolve(files);
      } catch (e) {
        iframe.remove();
        resolve(null);
      }
    };
    iframe.onerror = () => { clearTimeout(timer); iframe.remove(); resolve(null); };
    iframe.src = dirPath;
    document.body.appendChild(iframe);
  });
}

async function initImageDir() {
  // Try IndexedDB cache first (instant, no dialog)
  const cached = await idbGet('dirImagesData').catch(() => null);
  if (cached && cached.length > 0) {
    loadDirImagesFromData(cached);
    return;
  }

  // Try scanning ../images/ via iframe
  const names = await scanDirViaIframe('../images/');
  if (names && names.length > 0) {
    const imgNames = names.filter(n => /\.(png|jpg|jpeg|gif|webp)$/i.test(n));
    if (imgNames.length > 0) {
      loadImagesFromNames(imgNames);
      return;
    }
  }

  // Fallback: prompt via webkitdirectory on first canvas click
  const canvas = renderer.domElement;
  canvas.addEventListener('pointerdown', function firstPick() {
    canvas.removeEventListener('pointerdown', firstPick);
    dirInput.click();
  }, { once: true });
}

texBtn.addEventListener('click', async () => {
  // Clear IndexedDB cache first so we always do a fresh scan
  await idbSet('dirImagesData', []).catch(() => {});
  notify('Scanning ../images/...');
  const names = await scanDirViaIframe('../images/', 2000);
  if (names && names.length > 0) {
    const imgNames = names.filter(n => /\.(png|jpg|jpeg|gif|webp)$/i.test(n));
    if (imgNames.length > 0) {
      loadImagesFromNames(imgNames);
      return;
    }

  dirInput.click();
});

dirInput.addEventListener('change', (e) => {

texClearBtn.addEventListener('click', () => {

clearSelBtn?.addEventListener('click', () => clearSelection());

// ======== EXPORT / IMPORT ========

function exportJSON() {
  const data = {
    version: 2,
    blockSize: BLOCK_SIZE,
    blocks: [],
    textures: {},
    murals: [],
    labels: [],
  };

  const texMap = new Map();

  for (const [key, block] of blocks) {
    const b = {
      cell: [block.cell.x, block.cell.y, block.cell.z],
      type: block.type.id,
      color: block.color,
    };
    if (block.texture) {
      const texId = `tex_${block.id}`;
      b.textureId = texId;
      if (!texMap.has(block.texture.image.src)) {
        texMap.set(block.texture.image.src, texId);
        data.textures[texId] = block.texture.image.src;
      } else {
        b.textureId = texMap.get(block.texture.image.src);
      }
    }
    data.blocks.push(b);
  }

  for (let i = 0; i < murals.length; i++) {
    const m = murals[i];
    let texId = texMap.get(m.textureSrc);
    if (!texId) {
      texId = `tex_mural_${i}`;
      texMap.set(m.textureSrc, texId);
      data.textures[texId] = m.textureSrc;
    }
    data.murals.push({
      cell1: [m.cell1.x, m.cell1.y, m.cell1.z],
      cell2: [m.cell2.x, m.cell2.y, m.cell2.z],
      cellOrig: [m.cellOrig.x, m.cellOrig.y, m.cellOrig.z],
      normal: [m.normal.x, m.normal.y, m.normal.z],
      textureId: texId,
    });
  }

  for (const l of labels) {
    data.labels.push({
      cell1: [l.cell1.x, l.cell1.y, l.cell1.z],
      cell2: [l.cell2.x, l.cell2.y, l.cell2.z],
      cellOrig: [l.cellOrig.x, l.cellOrig.y, l.cellOrig.z],
      normal: [l.normal.x, l.normal.y, l.normal.z],
      text: l.text,
    });
  }

  return JSON.stringify(data, null, 2);
}

function saveToStorage() {
  try {
    const json = exportJSON();
    localStorage.setItem('builder_scene', json);
  } catch (e) { console.error('saveToStorage failed', e); }
}

function loadFromStorage() {
  try {
    const json = localStorage.getItem('builder_scene');
    if (json) importJSON(json);
  } catch (e) { console.error('loadFromStorage failed', e); }
}

function importJSON(json) {
  _importing = true;
  try {
    const data = JSON.parse(json);
    if (!data.blocks || !Array.isArray(data.blocks)) throw new Error('Invalid format');

    clearAll();

    // Preload textures from embedded data URLs
    const texCache = {};
    if (data.textures) {
      for (const [id, src] of Object.entries(data.textures)) {
        const img = new Image();
        img.src = src;
        const tex = new THREE.Texture(img);
        img.onload = () => { tex.needsUpdate = true; };
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.needsUpdate = true;
        texCache[id] = tex;
      }
    }

    for (const b of data.blocks) {
      const cell = { x: b.cell[0], y: b.cell[1], z: b.cell[2] };
      if (isOccupied(cell)) continue;

      let type = BLOCK_TYPES.find(t => t.id === b.type);
      if (!type) type = BLOCK_TYPES[0];
      const color = b.color || type.color;
      const tex = b.textureId ? texCache[b.textureId] : null;

      if (tex) {
        setTimeout(() => createBlock(cell, type, color, tex), 50);
      } else {
        createBlock(cell, type, color, null);
      }
    }

    if (Array.isArray(data.murals)) {
      for (const m of data.murals) {
        const tex = m.textureId ? texCache[m.textureId] : null;
        if (!tex) continue;
        const c1 = { x: m.cell1[0], y: m.cell1[1], z: m.cell1[2] };
        const cell2 = { x: m.cell2[0], y: m.cell2[1], z: m.cell2[2] };
        const orig = { x: m.cellOrig[0], y: m.cellOrig[1], z: m.cellOrig[2] };
        const normal = { x: m.normal[0], y: m.normal[1], z: m.normal[2] };
        setTimeout(() => {
          const mesh = buildMuralMesh(c1, cell2, normal, orig, tex);
          scene.add(mesh);
          murals.push({ mesh, cell1: { ...c1 }, cell2: { ...cell2 }, cellOrig: { ...orig }, normal: { ...normal }, textureSrc: tex.image.src });
        }, 50);
      }
    }

    if (Array.isArray(data.labels)) {
      for (const l of data.labels) {
        if (l.cell1 && l.cell2 && l.cellOrig && l.normal) {
          setTimeout(() => rebuildLabel({
            cell1: { x: l.cell1[0], y: l.cell1[1], z: l.cell1[2] },
            cell2: { x: l.cell2[0], y: l.cell2[1], z: l.cell2[2] },
            cellOrig: { x: l.cellOrig[0], y: l.cellOrig[1], z: l.cellOrig[2] },
            normal: { x: l.normal[0], y: l.normal[1], z: l.normal[2] },
            text: l.text,
          }), 50);
        }
      }
    }
  } catch (err) {
    alert('Import failed: ' + err.message);
  }
  // Save after all timeouts complete
  setTimeout(() => { _importing = false; saveToStorage(); }, 300);
}

exportBtn.addEventListener('click', async () => {
  const json = exportJSON();

  // 1) Use stored directory handle (picked once via showDirectoryPicker, saved in IndexedDB)
  const storedHandle = await idbGet('exportDirHandle').catch(() => null);
  if (storedHandle) {
    try {
      const perm = await storedHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const fh = await storedHandle.getFileHandle('shop_blocks.json', { create: true });
        const w = await fh.createWritable();
        await w.write(json);
        await w.close();
        notify('Exported shop_blocks.json');
        return;
      }
    } catch (e) {
      await idbSet('exportDirHandle', null).catch(() => {});
    }
  }

  // 2) showDirectoryPicker —ser picks ./json/ once, handle stored for future exports
  if (window.showDirectoryPicker) {
    try {
      const dirHandle = await window.showDirectoryPicker();
      const perm = await dirHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await idbSet('exportDirHandle', dirHandle);
        const fh = await dirHandle.getFileHandle('shop_blocks.json', { create: true });
        const w = await fh.createWritable();
        await w.write(json);
        await w.close();
        notify('Exported shop_blocks.json');
        return;
      }
    } catch (e) {
      if (e.name !== 'AbortError') notify('Export failed: ' + e.message);
      return;
    }
  }

  // 3) showSaveFilePicker fallback (remembered via id)
  if (window.showSaveFilePicker) {
    try {
      const fh = await window.showSaveFilePicker({
        suggestedName: 'shop_blocks.json',
        id: 'opencode-export',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      });
      const w = await fh.createWritable();
      await w.write(json);
      await w.close();
      notify('Exported shop_blocks.json');
      return;
    } catch (e) {
      if (e.name !== 'AbortError') notify('Export failed: ' + e.message);
      return;
    }
  }

  // 4) Universal fallback: Blob download + clipboard copy
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shop_blocks.json';
  a.click();
  URL.revokeObjectURL(url);
  try {
    await navigator.clipboard.writeText(json);
    notify('Downloaded shop_blocks.json (copied to clipboard)');
  } catch {
    notify('Downloaded shop_blocks.json');
  }
});

importBtn.addEventListener('click', () => importInput.click());
importInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();

});

// Keyboard shortcuts
function undo() {
  const action = undoStack.pop();
  if (!action) return;
  undoBlocked = true;

  if (action.type === 'place') {
    removeBlock(action.cell);
  } else if (action.type === 'remove') {
    createBlock(action.cell, action.saved.type, action.saved.color, action.saved.texture);
  } else if (action.type === 'repaint') {
    const data = blocks.get(cellKey(action.cell));
    if (data) {
      const mat = makeMaterial(action.oldType, action.oldColor, action.oldTexture);
      data.mesh.material.dispose();
      data.mesh.material = mat;
      data.type = action.oldType;
      data.color = action.oldColor;
      data.texture = action.oldTexture;
    }
  }

  undoBlocked = false;
}

document.addEventListener('keydown', (e) => {
  const ctrl = e.ctrlKey || e.metaKey;
  const key = e.key.toLowerCase();

  // Tab toggles fly mode
  if (e.key === 'Tab') {
    e.preventDefault();
    isFlyMode = !isFlyMode;
    navToggleBtn.textContent = isFlyMode ? 'WASD' : 'Orbit';
    if (isFlyMode) notify('WASD mode');
    else notify('Orbit mode');
    return;
  }

  // Fly mode: WASD + Space/Shift move the camera
  if (isFlyMode && (key === 'w' || key === 'a' || key === 's' || key === 'd' || key === ' ' || key === 'shift')) {
    e.preventDefault();
    const step = e.shiftKey ? -1 : (key === ' ' ? 1 : 0.5);
    if (key === 'w' || key === 's') {
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.y = 0;
      dir.normalize();
      if (key === 's') dir.negate();
      camera.position.add(dir.multiplyScalar(step));
    } else if (key === 'a' || key === 'd') {
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();
      const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
      if (key === 'a') right.negate();
      camera.position.add(right.multiplyScalar(step));
    } else {
      camera.position.y += step;
    }
    controls.update();
    return;
  }

  if (ctrl && key === 'z') { e.preventDefault(); undo(); return; }
  if (ctrl && key === 'c') { e.preventDefault(); copySelection(); return; }
  if (ctrl && key === 'x') { e.preventDefault(); cutSelection(); return; }
  if (ctrl && key === 'v') { e.preventDefault(); if (pasteGhostCell) { pasteAtPosition(pasteGhostCell); clearPasteGhost(); } else { pasteClipboard(); } return; }

  if (key === 's' && !isFlyMode) { toggleSelectMode(); return; }
  if (key === 'escape') { clearPasteGhost(); return; }
  if (key === 'delete' || key === 'backspace') {
    if (selection.size > 0) cutSelection();
    else if (blocks.size > 0 && confirm('Clear all blocks?')) clearAll();
    return;
  }
  if (key === 'e') { exportBtn.click(); return; }

  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      const step = e.key === 'ArrowUp' ? 1 : -1;
      zoomSlider.value = Math.max(2, Math.min(50, parseFloat(zoomSlider.value) + step));
      zoomSlider.dispatchEvent(new Event('input'));
    } else {
      const step = e.key === 'ArrowRight' ? -1 : 1;
      rotSlider.value = (parseFloat(rotSlider.value) + step + 360) % 360;
      rotSlider.dispatchEvent(new Event('input'));
    }
    return;
  }

  const num = parseInt(key);
  if (num >= 1 && num <= BLOCK_TYPES.length) {
    selectType(BLOCK_TYPES[num - 1].id);
  }
});
